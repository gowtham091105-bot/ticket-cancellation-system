apiVersion: apps/v1
kind: Deployment
metadata:
  name: ticket-cancellation-deployment
  labels:
    app: ticket-cancellation
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ticket-cancellation
  template:
    metadata:
      labels:
        app: ticket-cancellation
    spec:
      containers:
      - name: ticket-cancellation
        image: your-dockerhub-username/ticket-cancellation-system:latest
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: ticket-cancellation-service
spec:
  selector:
    app: ticket-cancellation
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
  type: LoadBalancer
